name: CD — Build sur tag

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-backend:
    name: Build Backend (tag)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances
        working-directory: backend
        run: npm ci

      - name: Génération du client Prisma
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Upload artefact backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.ref_name }}
          path: backend/dist/
          retention-days: 30

  build-frontend:
    name: Build Frontend (tag)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: frontend
        run: npm ci

      - name: Build de production Next.js
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}

      - name: Upload artefact frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.ref_name }}
          path: frontend/.next/
          retention-days: 30

  create-release:
    name: Création de la Release GitHub
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Création de la release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "Neosis ${{ github.ref_name }}"
